name: release

# Manual only — never on push.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (leave empty for 1.0.<run_number>)"
        required: false
        default: ""
      publish_aur:
        description: "Also publish to the AUR (requires AUR_* secrets)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  PROJECT: src/mdviewx/mdviewx.csproj
  DESKTOP_TFM: net10.0-desktop
  WINDOWS_TFM: net10.0-windows10.0.26100

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            v="${{ inputs.version }}"
          else
            v="1.0.${{ github.run_number }}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

  windows:
    needs: setup
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish portable (Skia desktop, win-x64)
        shell: pwsh
        run: >
          dotnet publish $env:PROJECT -f $env:DESKTOP_TFM -r win-x64 -c Release --self-contained true
          -p:UseBwetsReferences=false -p:ApplicationDisplayVersion=$env:VERSION -o publish/win-x64

      - name: Zip portable build
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath "mdviewx-$env:VERSION-win-x64.zip"

      # Microsoft Store package (WinAppSDK / MSIX). Unsigned — Partner Center re-signs on upload.
      # Best effort: requires the store identity in Package.appxmanifest (see packaging/microsoft-store).
      - name: Build MSIX (Microsoft Store)
        shell: pwsh
        continue-on-error: true
        run: >
          dotnet build $env:PROJECT -f $env:WINDOWS_TFM -c Release -p:UseBwetsReferences=false
          -p:ApplicationDisplayVersion=$env:VERSION
          -p:GenerateAppxPackageOnBuild=true -p:AppxPackageSigningEnabled=false
          -p:AppxPackageDir=${{ github.workspace }}\msix\

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            mdviewx-*-win-x64.zip
            msix/**/*.msix*
          if-no-files-found: warn

  linux:
    needs: setup
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish & package each architecture
        run: |
          set -euo pipefail
          for rid in linux-x64 linux-arm64; do
            out="mdviewx-$VERSION-$rid"
            dotnet publish "$PROJECT" -f "$DESKTOP_TFM" -r "$rid" -c Release --self-contained true \
              -p:UseBwetsReferences=false -p:ApplicationDisplayVersion="$VERSION" -o "$out"
            # Bundle the desktop entry + icon so the tarball is self-contained for packaging.
            cp packaging/linux/mdviewx.desktop "$out/mdviewx.desktop"
            cp src/mdviewx/Assets/Icons/icon.svg "$out/mdviewx.svg"
            chmod +x "$out/mdviewx" || true
            tar -czf "$out.tar.gz" "$out"
          done

      - name: Build .deb (x64)
        run: bash packaging/linux/build-deb.sh "$VERSION" "mdviewx-$VERSION-linux-x64"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            mdviewx-*-linux-*.tar.gz
            *.deb

  release:
    needs: [setup, windows, linux]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.deb' -o -name '*.msix' -o -name '*.msixbundle' \) -print0 \
            | xargs -0 sha256sum > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: mdviewx ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.msix
            dist/**/*.msixbundle
            SHA256SUMS

  aur:
    needs: [setup, release]
    if: ${{ inputs.publish_aur }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist

      - name: Render PKGBUILD
        run: |
          set -euo pipefail
          sha=$(sha256sum "dist/mdviewx-$VERSION-linux-x64.tar.gz" | cut -d' ' -f1)
          sed -e "s/__VERSION__/$VERSION/g" -e "s/__SHA256__/$sha/g" \
            packaging/aur/PKGBUILD.template > PKGBUILD
          echo "----- PKGBUILD -----"; cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2
        with:
          pkgname: mdviewx
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.setup.outputs.version }}"
