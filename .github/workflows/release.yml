name: release

# Manual only — never on push.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (leave empty for 1.0.<run_number>)"
        required: false
        default: ""
      publish_aur:
        description: "Also publish to the AUR (requires AUR_* secrets)"
        type: boolean
        default: false
      publish_winget:
        description: "Also update winget (requires WINGET_TOKEN; package must already exist)"
        type: boolean
        default: false
      publish_store:
        description: "Also submit to the Microsoft Store (requires AZURE_AD_*/SELLER_ID/STORE_PRODUCT_ID; app must be live + free)"
        type: boolean
        default: false

permissions:
  contents: write

env:
  PROJECT: src/MarkdownBlaze/MarkdownBlaze.csproj

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ -n "${{ inputs.version }}" ]; then v="${{ inputs.version }}"; else v="1.0.${{ github.run_number }}"; fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Release version: $v"

  windows:
    needs: setup
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (win-x64, self-contained)
        shell: pwsh
        run: dotnet publish $env:PROJECT -c Release -r win-x64 --self-contained true -p:Version=$env:VERSION -o publish/win-x64

      - name: Zip (portable)
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath "MarkdownBlaze-$env:VERSION-win-x64.zip"

      # Installer (registers the .md / .markdown association); this is what winget installs.
      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=$env:VERSION" "/DPublishDir=$env:GITHUB_WORKSPACE\publish\win-x64" "/O$env:GITHUB_WORKSPACE" packaging\windows\MarkdownBlaze.iss

      # Package the same publish output as a self-signed, sideloadable MSIX. (For the Store, replace
      # the self-signed cert with your Partner Center identity / a real code-signing cert.)
      - name: Build MSIX (self-signed)
        shell: pwsh
        run: |
          $pub = "publish/win-x64"
          New-Item -ItemType Directory -Force "$pub/Images" | Out-Null
          Add-Type -AssemblyName System.Drawing
          function Logo($w,$h,$path,$fs){ $b=New-Object System.Drawing.Bitmap $w,$h; $g=[System.Drawing.Graphics]::FromImage($b); $g.Clear([System.Drawing.ColorTranslator]::FromHtml("#E8540F")); $g.SmoothingMode='AntiAlias'; $g.TextRenderingHint='AntiAliasGridFit'; $f=New-Object System.Drawing.Font("Segoe UI",$fs,[System.Drawing.FontStyle]::Bold); $sf=New-Object System.Drawing.StringFormat; $sf.Alignment='Center'; $sf.LineAlignment='Center'; $g.DrawString("M",$f,[System.Drawing.Brushes]::White,(New-Object System.Drawing.RectangleF(0,0,$w,$h)),$sf); $b.Save($path,[System.Drawing.Imaging.ImageFormat]::Png); $g.Dispose(); $b.Dispose() }
          Logo 44 44 "$pub/Images/Square44x44Logo.png" 20
          Logo 150 150 "$pub/Images/Square150x150Logo.png" 78
          Logo 50 50 "$pub/Images/StoreLogo.png" 24
          (Get-Content packaging/windows/AppxManifest.xml -Raw).Replace("__VERSION__", "$env:VERSION.0") | Set-Content "$pub/AppxManifest.xml"
          $sdk = Get-ChildItem "C:/Program Files (x86)/Windows Kits/10/bin" -Directory | Where-Object Name -match '^10\.' | Sort-Object Name -Descending | Select-Object -First 1
          $makeappx = Join-Path $sdk.FullName "x64/makeappx.exe"
          $signtool = Join-Path $sdk.FullName "x64/signtool.exe"
          $msix = "MarkdownBlaze-$env:VERSION-win-x64.msix"
          & $makeappx pack /o /d $pub /p $msix
          # Self-sign with a cert whose subject matches the manifest Publisher (required for sideload).
          [xml]$m = Get-Content "$pub/AppxManifest.xml"
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject $m.Package.Identity.Publisher -CertStoreLocation Cert:\CurrentUser\My -NotAfter (Get-Date).AddYears(5)
          & $signtool sign /fd SHA256 /sha1 $cert.Thumbprint $msix
          Export-Certificate -Cert $cert -FilePath "MarkdownBlaze-$env:VERSION.cer" | Out-Null

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            MarkdownBlaze-*-win-x64.zip
            MarkdownBlaze-*-win-x64-setup.exe
            MarkdownBlaze-*-win-x64.msix
            MarkdownBlaze-*.cer

  linux:
    needs: setup
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish & package each architecture
        run: |
          set -euo pipefail
          for rid in linux-x64 linux-arm64; do
            out="MarkdownBlaze-$VERSION-$rid"
            dotnet publish "$PROJECT" -c Release -r "$rid" --self-contained true -p:Version="$VERSION" -o "$out"
            # Bundle the desktop entry + icon so the tarball is self-contained for packaging.
            cp packaging/linux/MarkdownBlaze.desktop "$out/MarkdownBlaze.desktop"
            cp src/MarkdownBlaze/Assets/icon.svg "$out/MarkdownBlaze.svg"
            chmod +x "$out/MarkdownBlaze" || true
            tar -czf "$out.tar.gz" "$out"
          done

      - name: Build .deb (x64)
        run: bash packaging/linux/build-deb.sh "$VERSION" "MarkdownBlaze-$VERSION-linux-x64"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            MarkdownBlaze-*-linux-*.tar.gz
            *.deb

  release:
    needs: [setup, windows, linux, archpkg]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          find . -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.deb' -o -name '*.msix' -o -name '*-setup.exe' -o -name '*.pkg.tar.zst' \) -print0 \
            | xargs -0 sha256sum > ../SHA256SUMS
          cat ../SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: MarkdownBlaze ${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/**/*.zip
            dist/**/*.tar.gz
            dist/**/*.deb
            dist/**/*.pkg.tar.zst
            dist/**/*.msix
            dist/**/*-setup.exe
            dist/**/*.cer
            SHA256SUMS

  aur:
    needs: [setup, release]
    if: ${{ inputs.publish_aur }}
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.setup.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: dist

      - name: Render PKGBUILD
        run: |
          set -euo pipefail
          sha=$(sha256sum "dist/MarkdownBlaze-$VERSION-linux-x64.tar.gz" | cut -d' ' -f1)
          sed -e "s/__VERSION__/$VERSION/g" -e "s/__SHA256__/$sha/g" \
            packaging/aur/PKGBUILD.template > PKGBUILD
          echo "----- PKGBUILD -----"; cat PKGBUILD

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2
        with:
          pkgname: MarkdownBlaze
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to ${{ needs.setup.outputs.version }}"

  winget:
    needs: [setup, release]
    if: ${{ inputs.publish_winget }}
    runs-on: ubuntu-latest
    steps:
      # Opens an update PR to microsoft/winget-pkgs for the portable zip.
      # The package must already exist there (seed the first version manually — see packaging/winget).
      - uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: GregoryKieffer.MarkdownBlaze
          version: ${{ needs.setup.outputs.version }}
          release-tag: v${{ needs.setup.outputs.version }}
          installers-regex: '-win-x64-setup\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

  store:
    needs: [setup, windows]
    if: ${{ inputs.publish_store }}
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: dist
      - name: Set up Microsoft Store Developer CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1
      - name: Configure credentials
        run: >
          msstore reconfigure
          --tenantId ${{ secrets.AZURE_AD_TENANT_ID }}
          --sellerId ${{ secrets.SELLER_ID }}
          --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }}
          --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}
      - name: Publish package to the Store
        shell: pwsh
        run: |
          $msix = (Get-ChildItem dist -Recurse -Filter *.msix | Select-Object -First 1).FullName
          msstore publish "$msix" -id ${{ secrets.STORE_PRODUCT_ID }}

  # Native Arch package (.pkg.tar.zst) — built before the release from the locally-built tarball,
  # then included in the release alongside the .deb. Installable with `pacman -U`, no AUR needed.
  archpkg:
    needs: [setup, linux]
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install git (for checkout)
        run: pacman -Syu --noconfirm git
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: linux
      - name: Build pacman package (from the local tarball)
        run: |
          set -euo pipefail
          ver="${{ needs.setup.outputs.version }}"
          useradd -m builder
          build=/home/builder/build
          install -d -o builder "$build"
          # Place the locally-built tarball under the name the PKGBUILD source expects, so makepkg
          # uses it instead of downloading the (not-yet-published) release URL.
          cp "linux/MarkdownBlaze-$ver-linux-x64.tar.gz" "$build/MarkdownBlaze-$ver.tar.gz"
          sha=$(sha256sum "$build/MarkdownBlaze-$ver.tar.gz" | cut -d' ' -f1)
          sed -e "s/__VERSION__/$ver/g" -e "s/__SHA256__/$sha/g" packaging/aur/PKGBUILD.template > "$build/PKGBUILD"
          chown -R builder:builder "$build"
          # --nodeps: runtime libs (gtk3, webkit2gtk-4.1) aren't needed to repackage a prebuilt
          # binary; they remain declared so `pacman -U` resolves them on install.
          sudo -u builder bash -c "cd '$build' && makepkg -f --nodeps --noconfirm"
          cp "$build"/*.pkg.tar.zst .
          ls -1 *.pkg.tar.zst
      - uses: actions/upload-artifact@v4
        with:
          name: arch
          path: '*.pkg.tar.zst'
